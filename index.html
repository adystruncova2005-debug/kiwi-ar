<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }
      #btn {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 10000; padding: 20px; background: white; border: none;
        font-family: sans-serif; font-weight: bold; border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <button id="btn">KLIKNI A NAMIŘ NA PLAKÁT</button>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no; uiLoading: no; maxSourceResolution: 1080;" 
      color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="rytmus.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
        <a-asset-item id="kiwi" src="./kiwi.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#vid" width="1" height="1.41" position="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model src="#kiwi" position="0 0 0.1" scale="0.1 0.1 0.1"></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const v = document.getElementById('vid');
      const b = document.getElementById('btn');
      
      // Totální reset a spuštění po kliku
      b.addEventListener('click', () => {
        v.play(); 
        b.style.display = 'none';
      });

      // Pojistka: Když se najde plakát, zkusíme play znova
      document.querySelector('a-scene').addEventListener("targetFound", () => {
        v.play();
      });
    </script>
  </body>
</html>
