<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }
      
      /* Neviditelná vrstva přes celý displej */
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 99999; background: rgba(0,0,0,0);
      }
    </style>
  </head>
  <body>
    <div id="overlay"></div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no; uiLoading: no; maxSourceResolution: 1080;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights: true" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="kiwiModel" src="./kiwi.glb"></a-asset-item>
        <video id="rytmusVideo" src="rytmus.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#rytmusVideo" width="1" height="1.41" position="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="directional" position="1 2 2" intensity="1.2"></a-light>
        <a-gltf-model src="#kiwiModel" position="0 0 0.1" rotation="0 0 0" scale="0.1 0.1 0.1"></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const video = document.getElementById('rytmusVideo');
      const overlay = document.getElementById('overlay');
      const scene = document.querySelector('a-scene');

      // Jakmile uživatel poprvé sáhne na displej, video se "připraví"
      overlay.addEventListener('touchstart', unlock, {once: true});
      overlay.addEventListener('click', unlock, {once: true});

      function unlock() {
        video.play();
        video.pause();
        overlay.style.display = 'none';
        console.log("Video odemknuto");
      }

      scene.addEventListener("targetFound", event => {
        if (event.detail.targetIndex === 0) {
          video.play();
        }
      });

      scene.addEventListener("targetLost", event => {
        video.pause();
      });
    </script>
  </body>
</html>
