<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        /* Totální reset, aby nikde nezbyl bílý pruh */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        
        /* Skryje scanning grafiku, pokud ji tam nechceš */
        .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: rgba(0,0,0,0.7); color: white;
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif; font-size: 1.2rem; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="overlay">ŤUKNI PRO SPUŠTĚNÍ AR</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiScanning: no;" 
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="v" src="rytmus.mp4" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
            <a-asset-item id="kiwiModel" src="./kiwi.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#v" width="1" height="1.41" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
            <a-gltf-model src="#kiwiModel" position="0 0 0.1" scale="0.1 0.1 0.1"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const v = document.querySelector('#v');
        const o = document.querySelector('#overlay');
        
        o.addEventListener('click', () => {
            v.play();
            o.style.display = 'none';
        });
    </script>
</body>
</html>
