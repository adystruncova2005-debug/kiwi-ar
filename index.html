<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; cursor: pointer; }
    </style>
</head>
<body>
    <div id="overlay"></div>
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 1000; missTolerance: 100; warmupSteps: 10;" 
        embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="v" src="rytmus.mp4" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#v" width="1" height="1.41" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const v = document.querySelector('#v');
        const o = document.querySelector('#overlay');
        o.addEventListener('click', () => {
            v.play();
            o.style.display = 'none';
        });
    </script>
</body>
</html>
