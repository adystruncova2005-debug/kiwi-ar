<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KIWI_AR_FINAL_v2</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
      /* Skryje jakékoli zbytky UI od MindAR pro maximálně čistý vzhled */
      .mindar-ui-overlay { display: none !important; }
      .mindar-ui-scanning { display: none !important; }
    </style>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no; uiLoading: no; maxSourceResolution: 1080;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights: true" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="kiwiModel" src="./kiwi.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 2 2" intensity="1.2"></a-light>

        <a-gltf-model 
          src="#kiwiModel" 
          position="0 0 0.1" 
          rotation="0 0 0" 
          scale="0.1 0.1 0.1">
        </a-gltf-model>

      </a-entity>
    </a-scene>

  </body>
</html>
