<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        
        /* Skryje pomocné grafiky MindAR, aby web vypadal čistě */
        .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }
        
        /* Neviditelné tlačítko přes celý displej - nutné pro odemčení videa na iPhone */
        #ar-button {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: transparent; border: none; cursor: pointer;
        }
    </style>
</head>
<body>
    <button id="ar-button"></button>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no; uiLoading: no; filterMinCF: 0.0001; filterBeta: 1000;" 
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="rytmusVideo" src="rytmus.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
            
            <a-asset-item id="kiwiModel" src="./kiwi.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#rytmusVideo" width="1" height="1.41" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
            <a-gltf-model src="#kiwiModel" position="0 0 0.1" scale="0.1 0.1 0.1"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const video = document.getElementById('rytmusVideo');
        const button = document.getElementById('ar-button');
        const sceneEl = document.querySelector('a-scene');

        // Jakmile klikneš kamkoliv na displej, video se "odemkne" a spustí
        button.addEventListener('click', () => {
            video.play().then(() => {
                // Tlačítko zmizí, aby neblokovalo další klikání v AR (pokud bys ho potřebovala)
                button.style.display = 'none';
            });
        });

        // Pojistka pro spuštění videa při nalezení plakátu
        sceneEl.addEventListener("targetFound", event => {
            if (event.detail.targetIndex === 0) {
                video.play();
            }
        });
    </script>
</body>
</html>
