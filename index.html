<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      .mindar-ui-overlay { display: none !important; }
      /* Styl pro startovací tlačítko */
      #startButton {
        position: fixed; top: 20px; left: 20px; z-index: 999;
        padding: 15px; background: #000; color: #fff; border: 1px solid #fff;
        font-family: monospace; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="startButton">KLIKNI PRO START AR</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no; uiLoading: no; maxSourceResolution: 1080;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights: true" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="kiwiModel" src="./kiwi.glb"></a-asset-item>
        <video id="rytmusVideo" src="rytmus.mp4" preload="auto" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#rytmusVideo" width="1" height="1.41" position="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 2 2" intensity="1.2"></a-light>
        <a-gltf-model src="#kiwiModel" position="0 0 0.1" rotation="0 0 0" scale="0.1 0.1 0.1"></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const videoEl = document.querySelector('#rytmusVideo');
      const startButton = document.querySelector('#startButton');
      const sceneEl = document.querySelector('a-scene');

      // Jakmile klikneš na tlačítko, video se "připraví" a tlačítko zmizí
      startButton.addEventListener('click', () => {
        videoEl.play().then(() => {
          videoEl.pause(); // Hned ho pauzneme, aby čekalo na plakát
          startButton.style.display = 'none';
        });
      });

      sceneEl.addEventListener("targetFound", event => {
        if (event.detail.targetIndex === 0) {
          videoEl.play();
        }
      });

      sceneEl.addEventListener("targetLost", event => {
        videoEl.pause();
      });
    </script>
  </body>
</html>
