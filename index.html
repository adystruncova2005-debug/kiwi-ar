<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        /* Tohle tlačítko je v rohu, aby nezavazelo a hned jsi věděla, jestli je pryč */
        #start-btn {
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            padding: 15px; background: #ff0000; color: white;
            border: none; border-radius: 8px; font-weight: bold;
        }
        .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }
    </style>
</head>
<body>
    <button id="start-btn">KLIKNI PRO START</button>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiScanning: no;" 
        embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="v" src="rytmus.mp4" loop="true" muted playsinline webkit-playsinline crossorigin="anonymous"></video>
            <a-asset-item id="kiwiModel" src="./kiwi.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#v" width="1" height="1.41"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
            <a-gltf-model src="#kiwiModel" position="0 0 0.1" scale="0.1 0.1 0.1"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const v = document.querySelector('#v');
        const btn = document.querySelector('#start-btn');
        
        btn.addEventListener('click', () => {
            v.play(); // Odemkne video
            btn.style.display = 'none'; // Schová tlačítko
        });
    </script>
</body>
</html>
