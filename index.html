<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* Startovací plocha */
        #ar-button {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; background: #000; color: white; border: none; 
            cursor: pointer; font-size: 18px; font-weight: bold;
        }

        /* Fullscreen Video kontejner - po nalezení plakátu vyskočí tohle */
        #video-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 20000; flex-direction: column;
            justify-content: center; align-items: center;
        }

        video#full-video { width: 100%; max-height: 80vh; }

        /* Text pod videem (ten tvůj upravený) */
        #video-text {
            color: white; padding: 20px; font-size: 14px; line-height: 1.5;
            text-align: left; max-width: 90%;
        }

        /* Tlačítko zavřít */
        #close-btn {
            position: absolute; top: 20px; right: 20px; background: white;
            color: black; border: none; padding: 10px 15px; border-radius: 50%;
            font-weight: bold; cursor: pointer; z-index: 20001;
        }

        .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }
    </style>
</head>
<body>
    <button id="ar-button">SPUSTIT SKENER</button>

    <!-- Tady je to video, co vyskočí přes celou obrazovku -->
    <div id="video-overlay">
        <button id="close-btn">X</button>
        <video id="full-video" src="rytmus.mp4" loop playsinline></video>
        <div id="video-text">
            Čtyřdenní cyklus pohybu a klidu, který se přímo propisuje do struktury mých dnů. 
            Diagonální posun zrcadlí neustálý proces adaptace, únavy a následné obnovy sil. 
            Je to biometrický otisk disciplíny v čase, kdy se vlastní tělo stává aktivním médiem pro záznam.
        </div>
    </div>

    <!-- AR scéna běží na pozadí a jen "číhá" na plakát -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no; uiLoading: no;" 
        loading-screen="enabled: false" embedded
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0" id="target-logic"></a-entity>
    </a-scene>

    <script>
        const startBtn = document.getElementById('ar-button');
        const overlay = document.getElementById('video-overlay');
        const fullVideo = document.getElementById('full-video');
        const closeBtn = document.getElementById('close-btn');
        const sceneEl = document.querySelector('a-scene');

        // Start skeneru
        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
        });

        // Detekce plakátu
        sceneEl.addEventListener("targetFound", event => {
            if (event.detail.targetIndex === 0) {
                // Plakát nalezen -> ukaž video přes celý mobil
                overlay.style.display = 'flex';
                fullVideo.play();
            }
        });

        // Zavření videa a návrat ke skeneru
        closeBtn.addEventListener('click', () => {
            fullVideo.pause();
            overlay.style.display = 'none';
        });
    </script>
</body>
</html>
