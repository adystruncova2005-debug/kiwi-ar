<!DOCTYPE html>
<html lang="cs">
<head>
    <title>AR_KIWI_PROJECT</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f0f0f0; }
        model-viewer { width: 100vw; height: 100vh; }
        #ar-button {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            padding: 15px 25px; background: #000; color: #fff; border: none;
            border-radius: 30px; font-family: sans-serif; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="kiwi.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        environment-image="neutral"
        exposure="1.2">
        
        <button slot="ar-button" id="ar-button">
            ZOBRAZIT V PROSTORU (AR)
        </button>
    </model-viewer>

</body>
</html>
